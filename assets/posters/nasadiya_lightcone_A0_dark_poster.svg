<text x="651" y="421" fill="#ffffff" font-family="Arial" font-size="11" font-weight="700">Comparison stack</text><text x="651" y="437" fill="#b8d1df" font-family="Arial" font-size="10">2MRS anchor + full DESI cloud</text>
<text x="651" y="486" fill="#ffffff" font-family="Arial" font-size="11" font-weight="700">Scope</text><text x="651" y="502" fill="#b8d1df" font-family="Arial" font-size="10">Footprint, targeting and selection effects remain visible.</text>
