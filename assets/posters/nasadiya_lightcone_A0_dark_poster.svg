<text x="52" y="1016" fill="#ffffff" font-family="Arial" font-size="12" font-weight="700">Available now</text><text x="52" y="1040" fill="#c3d8e5" font-family="Arial" font-size="10">• Full DESI cloud delivery in a static browser</text><text x="52" y="1058" fill="#c3d8e5" font-family="Arial" font-size="10">• 2MRS + DESI comparison stack</text><text x="52" y="1076" fill="#c3d8e5" font-family="Arial" font-size="10">• Display density, redshift and tracer controls</text>
<line x1="284" y1="1008" x2="284" y2="1100" stroke="#28678d"/>
<text x="306" y="1016" fill="#ffffff" font-family="Arial" font-size="12" font-weight="700">Interpretation</text><text x="306" y="1040" fill="#c3d8e5" font-family="Arial" font-size="10">• Survey geometry remains explicit</text><text x="306" y="1058" fill="#c3d8e5" font-family="Arial" font-size="10">• Display sample differs from the resident cloud</text><text x="306" y="1076" fill="#c3d8e5" font-family="Arial" font-size="10">• The stack is non-deduplicated</text>
