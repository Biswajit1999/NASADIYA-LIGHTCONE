<svg xmlns="http://www.w3.org/2000/svg" width="841mm" height="1189mm" viewBox="0 0 841 1189">
<defs>
  <linearGradient id="coneL" x1="0" x2="1"><stop offset="0" stop-color="#3ce6ff" stop-opacity=".08"/><stop offset=".58" stop-color="#28bce9" stop-opacity=".50"/><stop offset="1" stop-color="#f2b15b" stop-opacity=".85"/></linearGradient>
  <linearGradient id="coneR" x1="1" x2="0"><stop offset="0" stop-color="#7c67e8" stop-opacity=".12"/><stop offset=".58" stop-color="#45d9ff" stop-opacity=".48"/><stop offset="1" stop-color="#f2b15b" stop-opacity=".85"/></linearGradient>
  <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse"><circle cx="3" cy="4" r="1" fill="#8deaff" opacity=".7"/><circle cx="14" cy="10" r=".7" fill="#d2b0ff" opacity=".7"/><circle cx="8" cy="15" r=".6" fill="#f2b15b" opacity=".6"/></pattern>
  <filter id="glow"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="841" height="1189" fill="#030915"/>
<rect x="0" y="0" width="841" height="7" fill="#42dfff"/><rect x="0" y="7" width="841" height="1" fill="#f2b15b"/>
<path d="M30 31 L45 40 L30 49 L15 40 Z M30 34 L39 40 L30 46 L21 40 Z" fill="none" stroke="#64e8ff" stroke-width="1.7"/>
<text x="58" y="37" fill="#eaf8ff" font-family="Arial" font-size="17" font-weight="800" letter-spacing="1.6">NĀSADĪYA</text><text x="58" y="53" fill="#f2b15b" font-family="Arial" font-size="11" font-weight="700" letter-spacing="1.5">LIGHTCONE</text>
<text x="420" y="44" fill="#ffffff" font-family="Georgia" font-size="31" font-weight="700" text-anchor="middle">NĀSADĪYA LIGHTCONE</text>
<text x="420" y="67" fill="#6be7ff" font-family="Arial" font-size="14" font-weight="650" text-anchor="middle">Survey-native browser for 2MRS and DESI DR1 spectroscopic catalogues</text>
<text x="420" y="86" fill="#adcad9" font-family="Arial" font-size="9.2" text-anchor="middle">Biswajit Jana  |  Independent Researcher  |  github.com/Biswajit1999/NASADIYA-LIGHTCONE</text>
<line x1="28" y1="103" x2="813" y2="103" stroke="#295878"/>
<!-- left panels -->
<rect x="30" y="123" width="178" height="216" rx="10" fill="#07182a" stroke="#27668c"/>
<text x="47" y="147" fill="#6ce5ff" font-family="Arial" font-size="11" font-weight="700" letter-spacing="1.1">SCIENTIFIC AIM</text><line x1="47" y1="157" x2="191" y2="157" stroke="#28678d"/>
<text x="47" y="180" fill="#d6e8f2" font-family="Arial" font-size="10">• Interactive view of measured survey geometry</text>
<text x="47" y="199" fill="#d6e8f2" font-family="Arial" font-size="10">• Separate 2MRS and DESI source identities</text>
<text x="47" y="218" fill="#d6e8f2" font-family="Arial" font-size="10">• Expose redshift, tracers and density controls</text>
<text x="47" y="250" fill="#9bb8ca" font-family="Arial" font-size="10">Not a reconstructed all-sky density field.</text>
<rect x="30" y="354" width="178" height="270" rx="10" fill="#07182a" stroke="#27668c"/>
<text x="47" y="378" fill="#6ce5ff" font-family="Arial" font-size="11" font-weight="700" letter-spacing="1.1">DATA &amp; METHOD</text><line x1="47" y1="388" x2="191" y2="388" stroke="#28678d"/>
<text x="47" y="416" fill="#f2b15b" font-family="Arial" font-size="15" font-weight="800">43,533</text><text x="47" y="430" fill="#b8d1df" font-family="Arial" font-size="9">2MRS nearby galaxies</text>
<text x="47" y="462" fill="#6ce5ff" font-family="Arial" font-size="15" font-weight="800">6,093,818</text><text x="47" y="476" fill="#b8d1df" font-family="Arial" font-size="9">DESI DR1 LSS observed rows</text>
<text x="47" y="509" fill="#d6e8f2" font-family="Arial" font-size="10">Observer-centred coordinates:</text>
<text x="47" y="529" fill="#b8d1df" font-family="Courier New" font-size="10">x = r cos(δ) cos(α)</text><text x="47" y="545" fill="#b8d1df" font-family="Courier New" font-size="10">y = r cos(δ) sin(α)</text><text x="47" y="561" fill="#b8d1df" font-family="Courier New" font-size="10">z = r sin(δ)</text>
<text x="47" y="593" fill="#d6e8f2" font-family="Arial" font-size="10">Static ES modules · Three.js · WebGL</text>
