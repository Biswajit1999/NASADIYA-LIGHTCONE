<text x="572" y="1016" fill="#ffffff" font-family="Arial" font-size="12" font-weight="700">Next research output</text><text x="572" y="1040" fill="#c3d8e5" font-family="Arial" font-size="10">• Representation-fidelity measurements</text><text x="572" y="1058" fill="#c3d8e5" font-family="Arial" font-size="10">• Redshift, tracer, sky and voxel comparisons</text><text x="572" y="1076" fill="#c3d8e5" font-family="Arial" font-size="10">• Reproducible methods and results package</text>
